name: Bug report
description: Report a product issue in Agent Foundry
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.
  - type: input
    id: version
    attributes:
      label: Version
      description: Which Agent Foundry version are you using?
      placeholder: 1.0.0
    validations:
      required: true
  - type: textarea
    id: stack
    attributes:
      label: Repository shape
      description: Describe the repository or stack where the issue happened
      placeholder: Next.js app, pnpm monorepo, Python service, etc.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
